<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">       <!--header matadata & stylesheet-->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio | Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">           <!--globle navigation headder-->
    <div class="container nav-wrapper">
      <a class="logo" href="index.html">Thisen S.Gunawardhana</a>
      <button class="menu-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="nav-menu">☰</button>
      <nav class="nav" id="nav-menu">
        <a href="index.html">Home</a>
        <a href="blog.html">Blog</a>
        <a class="active" href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">            <!--contacts layout grid -->
      <div class="container contact-grid">
        <div>
          <p class="eyebrow">Contact</p>
          <h1 class="page-title">Connect with me</h1>
          <p class="lead">Use the form and fill all your details with your massage.</p>
        </div>            <!--Intractive form configuration -->

        <form class="card form-card" id="contactForm" novalidate>
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" required>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>
          </div>

          <button class="btn primary" type="submit">Send Message</button>
          <p class="form-message" id="formMessage" role="status" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
